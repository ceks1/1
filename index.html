<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Utrovački prevodilac</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .kartica {
      background: white;
      border-radius: 16px;
      padding: 2rem;
      width: 100%;
      max-width: 560px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }

    h1 { font-size: 22px; margin-bottom: 0.5rem; color: #1a1a1a; }
    p.opis { font-size: 13px; color: #888; margin-bottom: 1.5rem; }

    .prekidac {
      display: flex;
      gap: 8px;
      margin-bottom: 1.5rem;
    }

    .prekidac button {
      flex: 1;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: #f7f7f7;
      cursor: pointer;
      font-size: 14px;
      color: #555;
      transition: all 0.2s;
    }

    .prekidac button.aktivan {
      background: #1a1a1a;
      color: white;
      border-color: #1a1a1a;
    }

    .red {
      display: flex;
      gap: 12px;
      align-items: flex-end;
      margin-bottom: 1.5rem;
    }

    .kolona { flex: 1; }

    label {
      display: block;
      font-size: 13px;
      color: #666;
      margin-bottom: 6px;
    }

    input[type="text"] {
      width: 100%;
      font-size: 18px;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus { border-color: #555; }

    .strelica { font-size: 24px; color: #aaa; padding-bottom: 10px; }

    .rezultat-box {
      width: 100%;
      font-size: 22px;
      font-weight: bold;
      padding: 10px 14px;
      background: #f7f7f7;
      border: 1px solid #ddd;
      border-radius: 8px;
      min-height: 50px;
      color: #1a1a1a;
    }

    .greska { color: #cc3333; font-size: 14px; margin-bottom: 1rem; }
    .koraci { border-top: 1px solid #eee; padding-top: 1rem; }
    .koraci:empty { border-top: none; }

    .korak {
      font-size: 13px;
      color: #555;
      padding: 5px 0;
      border-bottom: 1px solid #f0f0f0;
    }

    .korak:last-child { border-bottom: none; }
    .brisi { color: #cc3333; font-weight: bold; }
    .dodaj { color: #228833; font-weight: bold; }
  </style>
</head>
<body>

<div class="kartica">
  <h1>Utrovački prevodilac</h1>
  <p class="opis">Utrovački jezik: <strong>deda</strong> → <strong>udazadenje</strong></p>

  <div class="prekidac">
    <button id="btn-normalno" class="aktivan" onclick="setSmer('normalno')">Normalno → Utrovački</button>
    <button id="btn-obrnuto" onclick="setSmer('obrnuto')">Utrovački → Normalno</button>
  </div>

  <div class="red">
    <div class="kolona">
      <label id="label-ulaz">Unesi reč</label>
      <input type="text" id="ulaz" placeholder="" oninput="prevedi()" />
    </div>
    <div class="strelica">→</div>
    <div class="kolona">
      <label>Rezultat</label>
      <div class="rezultat-box" id="rezultat"></div>
    </div>
  </div>

  <div class="greska" id="greska"></div>
  <div class="koraci" id="koraci"></div>
</div>

<script>
  let smer = 'normalno';

  function setSmer(novi) {
    smer = novi;
    document.getElementById('ulaz').value = '';
    document.getElementById('rezultat').textContent = '';
    document.getElementById('koraci').innerHTML = '';
    document.getElementById('greska').textContent = '';

    if (smer === 'normalno') {
      document.getElementById('btn-normalno').classList.add('aktivan');
      document.getElementById('btn-obrnuto').classList.remove('aktivan');
      document.getElementById('label-ulaz').textContent = 'Unesi normalnu reč';
    } else {
      document.getElementById('btn-obrnuto').classList.add('aktivan');
      document.getElementById('btn-normalno').classList.remove('aktivan');
      document.getElementById('label-ulaz').textContent = 'Unesi utrovačku reč';
    }
  }

  function napravljSlogove(rec) {
    const samoglasnici = 'aeiouaeiou';
    let slogovi = [];
    let trenutni = '';

    for (let i = 0; i < rec.length; i++) {
      trenutni += rec[i];
      if (samoglasnici.includes(rec[i])) {
        slogovi.push(trenutni);
        trenutni = '';
      }
    }

    if (trenutni) {
      if (slogovi.length > 0) {
        slogovi[slogovi.length - 1] += trenutni;
      } else {
        slogovi.push(trenutni);
      }
    }

    return slogovi;
  }

  function sifruj(rec) {
    const log = [];
    const slogovi = napravljSlogove(rec);

    log.push(`Slogovi: <strong>${slogovi.join(' + ')}</strong>`);

    if (slogovi.length < 2) {
      return { rezultat: null, log, greska: 'Reč mora imati najmanje 2 sloga.' };
    }

    const prvi = slogovi[0];
    const drugi = slogovi[1];
    const ostatak = slogovi.slice(2).join('');

    const utrovacki = 'u' + drugi + 'za' + prvi + (ostatak ? ostatak : '') + 'nje';

    log.push(`Složi: <span class="dodaj">u</span> + <strong>${drugi}</strong> + <span class="dodaj">za</span> + <strong>${prvi}</strong>${ostatak ? ' + <strong>' + ostatak + '</strong>' : ''} + <span class="dodaj">nje</span>`);
    log.push(`Rezultat: <strong>${utrovacki}</strong>`);

    return { rezultat: utrovacki, log, greska: null };
  }

  function desifruj(rec) {
    const log = [];

    if (!rec.startsWith('u')) {
      return { rezultat: null, log, greska: 'Utrovačka reč mora počinjati sa "u".' };
    }
    rec = rec.slice(1);
    log.push(`Skinut <span class="brisi">u</span> sa početka → <strong>${rec}</strong>`);

    if (!rec.endsWith('nje')) {
      return { rezultat: null, log, greska: 'Utrovačka reč mora završavati sa "nje".' };
    }
    rec = rec.slice(0, -3);
    log.push(`Skinut <span class="brisi">nje</span> sa kraja → <strong>${rec}</strong>`);

    const idx = rec.indexOf('za');
    if (idx === -1) {
      return { rezultat: null, log, greska: 'Nema "za" u sredini.' };
    }

    const drugiSlog = rec.slice(0, idx);
    const ostatak = rec.slice(idx + 2);

    log.push(`Podeli na <span class="brisi">za</span>: drugi slog = <strong>${drugiSlog}</strong>, prvi slog = <strong>${ostatak}</strong>`);

    const rezultat = ostatak + drugiSlog;
    log.push(`Spoji u pravi redosled: <strong>${ostatak}</strong> + <strong>${drugiSlog}</strong> = <strong>${rezultat}</strong>`);

    return { rezultat, log, greska: null };
  }

  function prevedi() {
    const ulaz = document.getElementById('ulaz').value.trim().toLowerCase();
    const rezultatEl = document.getElementById('rezultat');
    const koraciEl = document.getElementById('koraci');
    const greskaEl = document.getElementById('greska');

    rezultatEl.textContent = '';
    koraciEl.innerHTML = '';
    greskaEl.textContent = '';

    if (!ulaz) return;

    const ishod = smer === 'normalno' ? sifruj(ulaz) : desifruj(ulaz);

    if (ishod.greska) {
      greskaEl.textContent = ishod.greska;
      prikaziKorake(ishod.log);
    } else {
      rezultatEl.textContent = ishod.rezultat;
    }
  }

  function prikaziKorake(log) {
    const koraciEl = document.getElementById('koraci');
    log.forEach((txt, i) => {
      const d = document.createElement('div');
      d.className = 'korak';
      d.innerHTML = `<strong>Korak ${i + 1}:</strong> ` + txt;
      koraciEl.appendChild(d);
    });
  }
</script>

</body>
</html>
